services:
  searxng:
    image: docker.io/searxng/searxng:latest
    container_name: sparkle-searxng
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./settings.yml:/etc/searxng/settings.yml:ro
    environment:
      - BASE_URL=${SEARXNG_BASE_URL:-http://localhost:8080/}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/search?q=test&format=json"]
      interval: 20s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    container_name: sparkle-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    expose:
      - 6333
      - 6334
    volumes:
      - qdrant-storage:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:6333/readyz"]
      interval: 20s
      timeout: 5s
      retries: 10

volumes:
  qdrant-storage:
