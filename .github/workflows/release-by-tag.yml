name: Build and Release (Tag-based)

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact-name: sparkle-cli-linux-amd64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            artifact-name: sparkle-cli-darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact-name: sparkle-cli-darwin-arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact-name: sparkle-cli-windows-amd64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -o ${{ matrix.artifact-name }} ./cmd/sparkle-cli/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-name }}
          retention-days: 5

  create-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Prepare release assets
        run: |
          mkdir -p ./release-assets
          find ./artifacts -type f ! -name '.gitkeep' -exec cp {} ./release-assets/ \;
          chmod +x ./release-assets/sparkle-cli-*
          ls -la ./release-assets/

      - name: Create Release with Auto-generated Notes
        uses: actions/create-release@v1
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true

      - name: Upload Linux artifact
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./release-assets/sparkle-cli-linux-amd64
          asset_name: sparkle-cli-linux-amd64
          asset_content_type: application/octet-stream

      - name: Upload macOS Intel artifact
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./release-assets/sparkle-cli-darwin-amd64
          asset_name: sparkle-cli-darwin-amd64
          asset_content_type: application/octet-stream

      - name: Upload macOS ARM artifact
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./release-assets/sparkle-cli-darwin-arm64
          asset_name: sparkle-cli-darwin-arm64
          asset_content_type: application/octet-stream

      - name: Upload Windows artifact
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./release-assets/sparkle-cli-windows-amd64.exe
          asset_name: sparkle-cli-windows-amd64.exe
          asset_content_type: application/octet-stream
