name: Build and Release

on:
  push:
    branches:
      - main

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      is-release: ${{ steps.extract.outputs.is-release }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from commit message
        id: extract
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          VERSION=$(echo "$COMMIT_MSG" | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          
          if [ -z "$VERSION" ]; then
            echo "No version found"
            echo "is-release=false" >> $GITHUB_OUTPUT
          else
            echo "Version found: $VERSION"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "is-release=true" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-version
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact-name: sparkle-cli-linux-amd64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            artifact-name: sparkle-cli-darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact-name: sparkle-cli-darwin-arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact-name: sparkle-cli-windows-amd64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -o ${{ matrix.artifact-name }} ./cmd/sparkle-cli/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-name }}
          retention-days: 1

  create-release:
    needs: [check-version, build]
    if: needs.check-version.outputs.is-release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Prepare release assets
        run: |
          mkdir -p ./release-assets
          find ./artifacts -type f -exec cp {} ./release-assets/ \;
          ls -la ./release-assets/

      - name: Create Release
        uses: actions/create-release@v1
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.check-version.outputs.version }}
          release_name: Release ${{ needs.check-version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true

      - name: Upload Linux artifact
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./release-assets/sparkle-cli-linux-amd64/sparkle-cli-linux-amd64
          asset_name: sparkle-cli-linux-amd64
          asset_content_type: application/octet-stream

      - name: Upload macOS Intel artifact
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./release-assets/sparkle-cli-darwin-amd64/sparkle-cli-darwin-amd64
          asset_name: sparkle-cli-darwin-amd64
          asset_content_type: application/octet-stream

      - name: Upload macOS ARM artifact
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./release-assets/sparkle-cli-darwin-arm64/sparkle-cli-darwin-arm64
          asset_name: sparkle-cli-darwin-arm64
          asset_content_type: application/octet-stream

      - name: Upload Windows artifact
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./release-assets/sparkle-cli-windows-amd64.exe/sparkle-cli-windows-amd64.exe
          asset_name: sparkle-cli-windows-amd64.exe
          asset_content_type: application/octet-stream
