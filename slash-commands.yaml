commands:
  - command: ticket
    prompt: |
      Genera un ticket de Jira en el lenguaje {lang} a partir de la descripcion:
      {input}
    system: You are an expert software engineer that writes concise implementation tickets.
    params: [lang]
    model: gemma4

  - command: incident
    prompt: |
      Redacta un resumen de incidente tecnico claro y accionable a partir de la siguiente informacion:
      {input}
    system: You are an incident manager focused on concise technical communication.
    model: gemma4

  - command: explain-pr
    prompt: |
      Explica este cambio de forma breve, con foco en impacto, riesgos y plan de validacion:
      {input}
    system: You are a senior software engineer writing pull request summaries.
    model: gemma4
